# v0.2.0 release pipeline — Tauri (Rust + JS UI).
# Triggered by pushing a tag matching v* from tauri-rewrite (or any
# branch with this workflow file). Builds signed Mac arm64 .dmg and
# Windows x64 NSIS installer + portable .exe via cargo-tauri, then
# attaches everything to a GitHub Release.
#
# Mac code-signing is opt-in via repository secrets (same pattern as
# v0.1.0):
#   MACOS_SIGN_IDENTITY      — full identity name
#                              ("Developer ID Application: NAME (TEAMID)")
#   MACOS_CERTIFICATE_P12    — base64-encoded .p12 export of the cert
#   MACOS_CERTIFICATE_PWD    — password set when exporting the .p12
#   MACOS_KEYCHAIN_PWD       — fresh password for the throwaway runner keychain
# When those aren't set, the .dmg ships unsigned and end users get
# Gatekeeper "unidentified developer" on first launch (recoverable
# via right-click → Open). Windows always ships unsigned for now (no
# EV cert).
#
# Notarization secrets (also opt-in; only run when ALL three are set
# AND signing succeeds):
#   APPLE_ID                 — Apple ID email associated with the cert
#   APPLE_PASSWORD           — app-specific password from appleid.apple.com
#                              (Sign-In & Security → App-Specific Passwords)
#   APPLE_TEAM_ID            — Team ID (e.g. 6M536MV7GT, last paren of the
#                              signing identity)
# When set, the .dmg gets submitted to Apple's notary service and
# stapled before upload. End users on macOS 10.15+ launch with no
# Gatekeeper prompt at all.
#
# NDI runtime dependency: libndi.dylib is now bundled into
# Contents/Frameworks/ via tauri.conf.json's bundle.macOS.frameworks
# config. End users no longer need NDI Tools installed for direct
# NDI ingest. The build still pulls the SDK headers from NewTek's
# Apple installer because grafton-ndi's build.rs uses bindgen.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed by gh release create

jobs:

  # ---------------------------------------------------------------
  # macOS arm64 — produces "ATEM IP Patchbay_<version>_aarch64.dmg"
  # ---------------------------------------------------------------
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry + git + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-arm64-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install NDI SDK (Apple)
        run: |
          # The grafton-ndi crate's build.rs needs the NDI SDK headers
          # at /Library/NDI SDK for Apple/include. NewTek's macOS .pkg
          # installs them there. Network blip falls through to error
          # so the failure mode is loud (vs the ci.yml soft-skip).
          curl -fSL -o /tmp/ndi-sdk.pkg \
            "https://downloads.ndi.tv/SDK/NDI_SDK_Mac/Install_NDI_SDK_v6_Apple.pkg"
          sudo installer -pkg /tmp/ndi-sdk.pkg -target /
          ls -la "/Library/NDI SDK for Apple/include" | head -3

      - name: Stage libndi.dylib at /usr/local/lib for bundle.macOS.frameworks
        run: |
          # bundle.macOS.frameworks in tauri.conf.json points at
          # /usr/local/lib/libndi.dylib (the standard NDI Tools install
          # location end users have). CI runners don't have NDI Tools
          # installed — we install the SDK above which puts the dylib
          # under /Library/NDI SDK for Apple/lib/macOS/. Copy it to
          # /usr/local/lib/ so the bundler's framework-copy step can
          # find it. Whichever filename the SDK ships (libndi.dylib,
          # libndi_for_macOS.dylib, etc.) gets normalized to libndi.dylib
          # at /usr/local/lib/.
          SDK_LIB="/Library/NDI SDK for Apple/lib/macOS"
          echo "SDK lib directory contents:"
          ls -la "$SDK_LIB/" || true
          DYLIB=$(ls "$SDK_LIB/"libndi*.dylib 2>/dev/null | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: no libndi*.dylib found in $SDK_LIB/" >&2
            exit 1
          fi
          sudo mkdir -p /usr/local/lib
          sudo cp -v "$DYLIB" /usr/local/lib/libndi.dylib
          # Pin install_name so binaries linking against this dylib
          # get @rpath/libndi.dylib in their load commands — matches
          # the NDI Tools shipped install_name and what the bundled
          # .app expects via its LC_RPATH (added in build.rs).
          sudo install_name_tool -id "@rpath/libndi.dylib" /usr/local/lib/libndi.dylib
          ls -lh /usr/local/lib/libndi*
          otool -D /usr/local/lib/libndi.dylib

      - name: Download FFmpeg sidecar (Jellyfin GPL build, arm64)
        run: |
          # Bundle FFmpeg into the .app so end users without Homebrew
          # can stream on first launch. Jellyfin's portable arm64 GPL
          # build is the same one v0.1.0 shipped — libsrt + HEVC +
          # VideoToolbox encoders all included, no shared libraries
          # to wrangle. Pinned version so the CI cache stays valid
          # across runs and the bundled binary is reproducible.
          JELLYFIN_VERSION="7.1.3-5"
          URL="https://github.com/jellyfin/jellyfin-ffmpeg/releases/download/v${JELLYFIN_VERSION}/jellyfin-ffmpeg_${JELLYFIN_VERSION}_portable_macarm64-gpl.tar.xz"
          curl -fSL -o /tmp/ffmpeg.tar.xz "$URL"
          mkdir -p /tmp/ffmpeg-extract src-tauri/sidecar
          tar -xJf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract
          cp /tmp/ffmpeg-extract/ffmpeg src-tauri/sidecar/ffmpeg
          chmod +x src-tauri/sidecar/ffmpeg
          ls -lh src-tauri/sidecar/
          src-tauri/sidecar/ffmpeg -version | head -3

      - name: Import signing identity (if secrets are set)
        env:
          CERT_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KC_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          if [ -z "$CERT_P12" ]; then
            echo "MACOS_CERTIFICATE_P12 not set — building unsigned. Users will see Gatekeeper on first launch."
            exit 0
          fi
          # Decode the base64 cert into a temp file.
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          # Throwaway keychain — never touches the runner's default.
          security create-keychain -p "$KC_PWD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KC_PWD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KC_PWD" build.keychain
          # Make our keychain the default + first in the search list so
          # `security find-identity` and tauri-cli pick up the cert.
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          rm /tmp/cert.p12

      - name: Disable signing in tauri.conf.json (no cert configured)
        if: ${{ env.HAS_CERT != 'true' }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
        run: |
          # When no cert is in the runner's keychain, tauri-cli's
          # codesign call against the hardcoded "Developer ID
          # Application: Stephen Walter (6M536MV7GT)" identity fails
          # with "specified item could not be found in the keychain".
          # Strip the signingIdentity field so the build produces an
          # unsigned .app — Gatekeeper warns on first launch
          # (recoverable via right-click -> Open), same as v0.1.0
          # without a configured cert.
          python3 -c "
          import json, pathlib
          p = pathlib.Path('src-tauri/tauri.conf.json')
          d = json.loads(p.read_text())
          mac = d.get('bundle', {}).get('macOS', {})
          mac.pop('signingIdentity', None)
          p.write_text(json.dumps(d, indent=2) + '\n')
          print('removed signingIdentity from tauri.conf.json')
          "

      - name: Build .app + .dmg
        env:
          # When the cert IS configured, APPLE_SIGNING_IDENTITY (and
          # bundle.macOS.signingIdentity in tauri.conf.json) drive the
          # signing. The env var lets Phase 9's MACOS_SIGN_IDENTITY
          # secret override the hardcoded identity in the conf.
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        working-directory: src-tauri
        run: cargo tauri build

      - name: Deep codesign every Mach-O in the .app (hardened runtime)
        # Tauri 2's bundler signs the main binary in Contents/MacOS/
        # and the dylibs in Contents/Frameworks/ but does NOT touch
        # arbitrary files placed via bundle.resources. Our FFmpeg
        # sidecar lands at Contents/Resources/sidecar/ffmpeg
        # un-signed (Jellyfin's GPL build is signed by Jellyfin, but
        # by the time the bundler copies it the original signature
        # may also be missing depending on the tarball + Apple's
        # notary REQUIRES every Mach-O in the bundle to be signed
        # by us with hardened runtime).
        #
        # alpha.6 came back from Apple's notary with status: Invalid
        # for exactly this reason. Re-sign every Mach-O in the .app
        # explicitly with --options runtime + our identity + a
        # timestamp before submitting. Sign inside-out so the outer
        # .app's signature reflects the final inner state.
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          APP="src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app"

          echo "===== Pre-sign state of embedded Mach-O binaries ====="
          while IFS= read -r f; do
            if file "$f" 2>/dev/null | grep -qE 'Mach-O'; then
              line=$(codesign -dvv "$f" 2>&1 | grep -E "TeamIdentifier=|flags=|Identifier=" | tr '\n' ' ' || true)
              printf '  %s: %s\n' "${f#$APP/}" "$line"
            fi
          done < <(find "$APP" -type f)

          echo "===== Re-signing every Mach-O with hardened runtime ====="
          while IFS= read -r f; do
            if file "$f" 2>/dev/null | grep -qE 'Mach-O'; then
              echo "  signing ${f#$APP/}"
              codesign --force --options runtime --timestamp \
                --sign "$SIGN_IDENTITY" "$f"
            fi
          done < <(find "$APP" -type f)

          echo "===== Re-signing the outer .app bundle ====="
          codesign --force --options runtime --timestamp \
            --sign "$SIGN_IDENTITY" "$APP"

          echo "===== Final verification (must exit 0) ====="
          codesign --verify --strict --deep --verbose=4 "$APP" 2>&1 | tail -20
          codesign -dvvv "$APP" 2>&1 | grep -E "Identifier|Authority|TeamId|Runtime"

      - name: Rebuild .dmg from re-signed .app
        # The .dmg Tauri produced is a snapshot of the .app from
        # BEFORE our deep codesign pass — so it still contains the
        # old (notary-rejecting) signatures. Discard it and build a
        # fresh .dmg from the now-properly-signed .app on disk.
        # hdiutil + UDZO matches Tauri's .dmg format; the difference
        # vs Tauri's bundle_dmg.sh is we lose the styled background +
        # custom layout, but for an alpha that's an acceptable trade.
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          APP="src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app"
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: no .dmg from cargo tauri build to replace" >&2
            exit 1
          fi
          echo "Replacing $DMG with a fresh build from the re-signed .app"

          STAGE=$(mktemp -d)
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          rm -f "$DMG"
          hdiutil create \
            -volname "ATEM IP Patchbay" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "$DMG"
          rm -rf "$STAGE"

          codesign --force --sign "$SIGN_IDENTITY" "$DMG"
          ls -lh "$DMG"

      - name: Sanity-check the bundle
        run: |
          ls -lh "src-tauri/target/release/bundle/dmg/"
          ls -lh "src-tauri/target/release/bundle/macos/"
          echo "===== .app codesign ====="
          codesign -dvvv "src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app" 2>&1 | grep -E "Identifier|Authority|TeamId|Runtime" || true
          echo "===== libndi.dylib ====="
          ls -lh "src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app/Contents/Frameworks/" 2>&1 || true
          codesign -dvvv "src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app/Contents/Frameworks/libndi.dylib" 2>&1 | grep -E "Identifier|Authority|TeamId|Runtime" || true
          echo "===== sidecar/ffmpeg ====="
          codesign -dvvv "src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app/Contents/Resources/sidecar/ffmpeg" 2>&1 | grep -E "Identifier|Authority|TeamId|Runtime" || true
          echo "===== Resources/static/ (UI bundle check) ====="
          ls -lh "src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app/Contents/Resources/static/" 2>&1 | head -10 || true

      - name: Notarize + staple .dmg
        # NO continue-on-error: if Apple rejects or stapling fails we
        # want the workflow to fail loudly rather than upload an
        # un-notarized .dmg masquerading as a notarized release. That
        # was the alpha.6 bug — notarytool returned status: Invalid,
        # the staple step couldn't fetch a non-existent ticket, and
        # `continue-on-error: true` allowed the unstapled .dmg to ship
        # to end users who then saw Gatekeeper warnings.
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          HAS_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        run: |
          set -euo pipefail
          if [ "$HAS_NOTARY" != "true" ]; then
            echo "Notarization secrets not set — skipping. End users will see Gatekeeper on first launch."
            exit 0
          fi
          APP="src-tauri/target/release/bundle/macos/ATEM IP Patchbay.app"
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found to notarize — bailing." >&2
            exit 1
          fi

          echo "Submitting $DMG to Apple's notary service..."
          # --wait blocks until the notary returns a verdict. We
          # capture the JSON output to parse status + submission id
          # — notarytool returns 0 even on Invalid status, so we MUST
          # read the response body to know if it actually passed.
          SUBMIT_OUT=$(mktemp)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait \
            --output-format json | tee "$SUBMIT_OUT"

          SUBMIT_ID=$(jq -r '.id // empty' "$SUBMIT_OUT" || echo "")
          SUBMIT_STATUS=$(jq -r '.status // empty' "$SUBMIT_OUT" || echo "")

          echo "Notary submission id: $SUBMIT_ID"
          echo "Notary verdict: $SUBMIT_STATUS"

          if [ "$SUBMIT_STATUS" != "Accepted" ]; then
            echo "::error::Notarization rejected (status=$SUBMIT_STATUS, id=$SUBMIT_ID)"
            if [ -n "$SUBMIT_ID" ]; then
              echo "===== Detailed log from Apple's notary service ====="
              # `notarytool log` returns the full per-file rejection
              # JSON. Most useful field: .issues[] which lists each
              # binary that failed and why ("not signed with hardened
              # runtime", "missing entitlement", etc.).
              xcrun notarytool log "$SUBMIT_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_PASSWORD" \
                /dev/stdout || true
              echo "===== End of notary log ====="
            fi
            exit 1
          fi

          # Staple BOTH the .app and the .dmg. The .dmg's staple
          # covers the first-launch-from-mounted-volume path; the
          # .app's staple is what protects users who drag the .app
          # to /Applications and then go offline before first launch.
          # Apple's CloudKit ticket lookup keys on the codesign hash,
          # so stapling the on-disk .app — which has the same
          # codesign hash as the copy inside the .dmg — gets a valid
          # ticket attached.
          echo "Stapling $APP..."
          xcrun stapler staple "$APP"
          echo "Stapling $DMG..."
          xcrun stapler staple "$DMG"

          echo "Verifying staples..."
          xcrun stapler validate "$APP"
          xcrun stapler validate "$DMG"
          spctl --assess --verbose=4 --type install "$DMG"
          spctl --assess --verbose=4 --type exec "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Windows x64 — produces "ATEM IP Patchbay_<version>_x64-setup.exe"
  # via the NSIS bundle target. Unsigned for now.
  # ---------------------------------------------------------------
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + git + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-windows-x64-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install NDI SDK (Windows)
        shell: pwsh
        timeout-minutes: 5
        run: |
          # NewTek's NDI 6 SDK Windows installer hangs in CI no matter
          # what silent flag we pass — /S (NSIS), /SILENT, /VERYSILENT
          # (Inno Setup), /s /v"/qn" (InstallShield wrapper around MSI),
          # /quiet — all timeout. Best diagnosis: there's a
          # EULA-acceptance dialog or a UAC elevation prompt that no
          # flag bypasses on a non-interactive runner. Both alpha.6
          # and alpha.7 burned the full 5-min step timeout here.
          #
          # Skip the installer entirely. 7-Zip can extract most
          # Windows installer formats (NSIS, InstallShield SFX, MSI,
          # WiX, raw .cab) directly from the .exe stub without running
          # the install logic. We extract, locate the SDK tree by
          # finding Processing.NDI.Lib.h, then point grafton-ndi at it
          # via NDI_SDK_DIR. No EULA, no UAC, no hanging.
          $url = "https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20SDK.exe"
          $out = "$env:RUNNER_TEMP\ndi-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Write-Host "Downloaded $([math]::Round((Get-Item $out).Length / 1MB, 1)) MB installer to $out"

          $extract = "$env:RUNNER_TEMP\ndi-sdk-extracted"
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $sevenZip)) {
            Write-Host "ERROR: 7-Zip not found at $sevenZip on this runner"
            exit 1
          }
          Write-Host "Extracting installer with 7-Zip..."
          & $sevenZip x $out "-o$extract" -y -bb0 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: 7-Zip extraction failed (exit $LASTEXITCODE)"
            exit 1
          }

          # Some installers wrap an inner MSI. If we find one,
          # extract it too — that's where the SDK files live in
          # the InstallShield case.
          $msi = Get-ChildItem -Path $extract -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue `
            | Select-Object -First 1
          if ($null -ne $msi) {
            Write-Host "Found inner MSI: $($msi.FullName); extracting..."
            $extractMsi = "$env:RUNNER_TEMP\ndi-sdk-msi-extract"
            & $sevenZip x $msi.FullName "-o$extractMsi" -y -bb0 | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $extract = $extractMsi
            }
          }

          # Find Processing.NDI.Lib.h — canonical marker of the SDK
          # root. Its parent dir is Include/; the SDK base is the
          # grandparent.
          $header = Get-ChildItem -Path $extract -Filter "Processing.NDI.Lib.h" -Recurse -ErrorAction SilentlyContinue `
            | Select-Object -First 1
          if ($null -eq $header) {
            # NOTE: PowerShell parses `$var:` as a (malformed) variable
            # reference because `:` is the scope-name delimiter
            # (e.g. `$env:PATH`). We need `${var}:` to delimit. This
            # exact bug stranded alpha.6/.7/.8's Windows builds at this
            # script line — the parser bailed before any extraction
            # logic ran, so the failure looked like "SDK install hung"
            # but was actually "script never ran past parse phase."
            Write-Host "ERROR: Processing.NDI.Lib.h not found in extracted SDK"
            Write-Host "Top-level contents of ${extract}:"
            Get-ChildItem -Path $extract | Format-Table
            Write-Host "Recursing one level deeper:"
            Get-ChildItem -Path $extract -Recurse -Depth 2 | Format-Table
            exit 1
          }
          $sdkRoot = $header.Directory.Parent.FullName
          Write-Host "Found SDK root at: $sdkRoot"
          Get-ChildItem $sdkRoot | Format-Table

          # Verify the .lib import library is present (grafton-ndi's
          # build.rs links against this). Bail loudly if missing.
          $libPath = Join-Path $sdkRoot "Lib\x64\Processing.NDI.Lib.x64.lib"
          if (-not (Test-Path $libPath)) {
            Write-Host "ERROR: $libPath not present — grafton-ndi link will fail"
            Write-Host "Lib tree:"
            if (Test-Path "$sdkRoot\Lib") {
              Get-ChildItem "$sdkRoot\Lib" -Recurse | Format-Table
            }
            exit 1
          }
          Write-Host "Verified .lib at $libPath"

          # Stage the .dll alongside ffmpeg.exe in the bundle's
          # sidecar/ dir so end users don't need NDI Tools installed
          # separately. tauri-bundler's resources glob picks it up
          # via "sidecar/*" in tauri.conf.json. The grafton-ndi-
          # produced .exe imports Processing.NDI.Lib.x64.dll at
          # runtime; bundling it next to ffmpeg.exe means ffmpeg_path
          # / NDI runtime resolution finds it via the same Resources/
          # path lookup.
          $dllPath = Join-Path $sdkRoot "Bin\x64\Processing.NDI.Lib.x64.dll"
          if (Test-Path $dllPath) {
            New-Item -ItemType Directory -Force -Path "src-tauri\sidecar" | Out-Null
            Copy-Item $dllPath -Destination "src-tauri\sidecar\Processing.NDI.Lib.x64.dll" -Force
            Write-Host "Staged Processing.NDI.Lib.x64.dll into src-tauri\sidecar\ for bundling"
          } else {
            Write-Host "WARNING: $dllPath not present — end users will need NDI Tools at runtime"
          }

          # Export NDI_SDK_DIR so grafton-ndi's build.rs picks it up
          # at link time. Build.rs honors this env var explicitly.
          "NDI_SDK_DIR=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Exported NDI_SDK_DIR=$sdkRoot"

      - name: Download FFmpeg sidecar (BtbN GPL build, x64)
        shell: pwsh
        run: |
          # Bundle FFmpeg into the NSIS installer so end users
          # without their own FFmpeg can stream on first launch.
          # BtbN's static GPL build pins libsrt + HEVC + nvenc
          # without DLL dependencies, same shape v0.1.0 shipped.
          $version = "n8.1"
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-$version-latest-win64-gpl-8.1.zip"
          $out = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $out
          Expand-Archive -Path $out -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extract"
          $ffmpeg = Get-ChildItem -Path "$env:RUNNER_TEMP\ffmpeg-extract" -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "src-tauri\sidecar" | Out-Null
          Copy-Item $ffmpeg.FullName -Destination "src-tauri\sidecar\ffmpeg.exe"
          Get-ChildItem src-tauri\sidecar
          & "src-tauri\sidecar\ffmpeg.exe" -version | Select-Object -First 3

      - name: Build .exe + NSIS installer
        working-directory: src-tauri
        run: cargo tauri build

      - name: Sanity-check the artifacts
        shell: pwsh
        run: |
          # NSIS installer present + sized
          Get-ChildItem src-tauri\target\release\bundle\nsis | Format-Table Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}

          # Verify the staged sidecar contents — these are what get
          # bundled into the NSIS installer's resources\sidecar\ subdir
          # and what SetDllDirectoryW points at runtime in lib.rs.
          # Without these the .exe launches but NDI features silently
          # fail with "module not found" at first NDI use.
          $sidecar = "src-tauri\sidecar"
          $required = @("Processing.NDI.Lib.x64.dll", "ffmpeg.exe")
          $missing = @()
          foreach ($f in $required) {
            $path = Join-Path $sidecar $f
            if (Test-Path $path) {
              $sizeMB = [math]::Round((Get-Item $path).Length / 1MB, 1)
              Write-Host "  [OK] sidecar\$f ($sizeMB MB)"
            } else {
              Write-Host "  [MISSING] sidecar\$f"
              $missing += $f
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host "ERROR: required sidecar files missing — Windows .exe will not work end-to-end"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Pull both artifacts together and create the GitHub Release.
  # ---------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    # Release if the Mac build succeeded — even if Windows
    # failed/cancelled. Mac-only alphas are still useful, and
    # blocking the .dmg publish on a flaky Windows installer was
    # what stranded alpha.6's Mac build at the artifact-only stage
    # for an hour. The Windows .exe simply doesn't appear in the
    # release if its build failed; users see a clear absence rather
    # than a stale .exe from a previous run.
    if: always() && needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for --generate-notes

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build the file list dynamically — Windows artifact may
          # be missing if its build failed (we still publish the
          # Mac build alone).
          FILES=()
          if compgen -G "artifacts/macos-arm64/*.dmg" > /dev/null; then
            FILES+=(artifacts/macos-arm64/*.dmg)
          fi
          if compgen -G "artifacts/windows-x64/*.exe" > /dev/null; then
            FILES+=(artifacts/windows-x64/*.exe)
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "${FILES[@]}"

# Lightweight CI — runs on every push to main and every PR.
# Compiles the package and smoke-tests the HTTP server. Doesn't try
# to exercise FFmpeg streaming or device enumeration; those need
# real hardware (or BtbN/Jellyfin static builds, which release.yml
# pulls but CI doesn't need).

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    name: Compile + HTTP smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile-check every Python module
        run: python -m py_compile bmd_emulator/*.py run.py probe.py

      - name: Boot HTTP server + verify /api/state
        run: |
          python run.py --no-browser --http-port 8095 --protocol-port 9981 &
          APP_PID=$!
          # Give the protocol + HTTP servers a moment to bind.
          sleep 3
          curl -fsS http://127.0.0.1:8095/api/state -o /tmp/state.json
          # Validate the response shape — these keys must exist for the
          # UI to render anything useful. If we ever rename any of them
          # in the snapshot, this catches it before merge.
          python <<'PY'
          import json, sys
          d = json.load(open("/tmp/state.json"))
          required = {
              "source_id", "video_mode", "video_codec",
              "available_video_modes", "available_services",
              "available_servers", "stats", "relay",
          }
          missing = required - d.keys()
          if missing:
              print(f"FAIL: snapshot missing keys: {sorted(missing)}", file=sys.stderr)
              sys.exit(1)
          assert d["stats"]["status"] in ("Idle", "Connecting", "Streaming", "Interrupted")
          print("OK — snapshot shape valid; status:", d["stats"]["status"])
          PY
          kill $APP_PID
